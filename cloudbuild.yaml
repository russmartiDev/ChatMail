# Cloud Build configuration for MailMind backend
# Trigger this on every push to main/master to build the container and deploy
# to Cloud Run. The service will pull environment variables from Cloud Build
# substitutions or Secret Manager.

steps:
  # build the image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/mailmind-backend', '.']

  # push the image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/mailmind-backend']

  # deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'mailmind-backend'
      - '--image'
      - 'gcr.io/$PROJECT_ID/mailmind-backend'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--set-env-vars'
      - "PORT=8080,JWT_SECRET=$JWT_SECRET,ANTHROPIC_API_KEY=$ANTHROPIC_API_KEY,GEMINI_API_KEY=$GEMINI_API_KEY,GOOGLE_CLIENT_ID=$GOOGLE_CLIENT_ID,GOOGLE_CLIENT_SECRET=$GOOGLE_CLIENT_SECRET,GOOGLE_REDIRECT_URI=$GOOGLE_REDIRECT_URI,ALLOWED_ORIGINS=$ALLOWED_ORIGINS,DATABASE_URL=$DATABASE_URL"

# substitutions can be provided when triggering the build, e.g. via GitHub
# repo connection. For sensitive data use Secret Manager and map with
# _JWT_SECRET="projects/$PROJECT_ID/secrets/jwt_secret/versions/latest"

substitutions:
  _JWT_SECRET: ''
  _ANTHROPIC_API_KEY: ''
  _GOOGLE_CLIENT_ID: ''
  _GOOGLE_CLIENT_SECRET: ''
  _GOOGLE_REDIRECT_URI: ''
  _ALLOWED_ORIGINS: ''
  _DATABASE_URL: ''
  _GEMINI_API_KEY: ''

# Optionally restrict trigger to branches
# available to Cloud Build triggers UI under repository settings
